<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Deep Context</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; position: relative; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; min-height: 50px; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; line-height: 1.4; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        .context-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #475569; font-size: 0.95rem; animation: fadeIn 0.8s ease-in; }
        .context-item { margin-bottom: 12px; line-height: 1.5; color: #cbd5e1; }
        .context-label { color: var(--primary); font-weight: bold; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .bridge-text { font-style: italic; color: #fbbf24; border-left: 2px solid #fbbf24; padding-left: 10px; display: block; margin-top: 5px; }
        
        .refresh-btn { display: block; width: 100%; background: #0ea5e9; border: none; color: white; padding: 15px; border-radius: 12px; cursor: pointer; margin-top: 15px; font-weight: bold; font-size: 1rem; }
        .refresh-btn:hover { background: #0284c7; }
        .refresh-btn:disabled { opacity: 0.5; cursor: wait; }
        
        .settings-link { position: absolute; top: 15px; right: 20px; color: #475569; font-size: 0.7rem; cursor: pointer; text-decoration: underline; background: none; border: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-link" onclick="resetKey()">Key ändern ⚙️</button>
    <h1>Daily Talk ✨</h1>
    <div class="status-area"><div id="statusText">Bereit für Inspiration?</div></div>
    <div id="results"></div>
    <button id="btnLoad" class="refresh-btn" onclick="startApp()">Inspiration laden</button>
</div>

<script>
    function resetKey() {
        if(confirm("API-Key löschen?")) {
            localStorage.removeItem('daily_talk_gemini_key');
            location.reload();
        }
    }

    async function startApp() {
        let apiKey = localStorage.getItem('daily_talk_gemini_key');
        if (!apiKey) {
            apiKey = prompt("Bitte gib deinen Gemini API-Key ein:");
            if (!apiKey) return;
            localStorage.setItem('daily_talk_gemini_key', apiKey.trim());
        }

        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');
        const btn = document.getElementById('btnLoad');

        btn.disabled = true;
        resultsDiv.innerHTML = '';
        status.textContent = "Hole News von GoodNews.eu...";

        try {
            const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://goodnews.eu/feed/')}`);
            const rssData = await rssRes.json();
            if (!rssData.items) throw new Error("Feed konnte nicht geladen werden.");
            
            const newsItems = rssData.items.slice(0, 3);

            newsItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${index}`;
                div.innerHTML = `
                    <span class="tag">Good News</span>
                    <h3>${item.title}</h3>
                    <div id="ctx-${index}" style="font-size:0.85rem; color:#64748b; font-style:italic;">KI bereitet Details vor... 🧠</div>
                `;
                div.style.animationDelay = `${index * 0.1}s`;
                resultsDiv.appendChild(div);
            });

            status.textContent = "News geladen. Kontext wird erstellt...";

            newsItems.forEach((item, i) => {
                loadContext(item.title, i, apiKey);
            });

        } catch (err) {
            status.textContent = "Fehler: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }

    async function loadContext(headline, index, key) {
        const container = document.getElementById(`ctx-${index}`);
        try {
            // Vereinfachter Prompt ohne JSON-Zwang um Filter zu umgehen
            const promptStr = `Erzähle mir etwas Nettes über diese Nachricht: "${headline}". 
            Schreibe genau drei Sätze, jeweils in eine neue Zeile ohne Nummern davor:
            Zeile 1: Ein lockerer Einstieg für ein Gespräch (Aufhänger).
            Zeile 2: Ein interessantes Detail oder Fakt dazu (Das Detail).
            Zeile 3: Eine offene Frage an das Gegenüber (Die Brücke).
            Antworte kurz und direkt.`;

            const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptStr }] }],
                    generationConfig: { temperature: 0.8 }
                })
            });

            const data = await aiRes.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const rawText = data.candidates[0].content.parts[0].text.trim();
                const lines = rawText.split('\n').filter(l => l.trim().length > 5);
                
                const aufhaenger = lines[0] || "Hast du schon von diesen tollen Neuigkeiten gehört?";
                const detail = lines[1] || "Es gibt spannende Fortschritte in diesem Bereich.";
                const bruecke = lines[2] || "Was denkst du, wie sich das in Zukunft entwickeln wird?";
                
                container.innerHTML = `
                    <div class="context-box">
                        <div class="context-item"><span class="context-label">Aufhänger</span>${aufhaenger}</div>
                        <div class="context-item"><span class="context-label">Das Detail</span>${detail}</div>
                        <div class="context-item"><span class="context-label">Die Brücke</span><span class="bridge-text">${bruecke}</span></div>
                    </div>`;
                container.style.fontStyle = "normal";
                container.style.color = "inherit";
            } else {
                container.textContent = "KI-Antwort konnte nicht geladen werden.";
            }
        } catch (e) {
            container.textContent = "Kontext aktuell nicht verfügbar.";
        }
    }

    window.onload = () => { if(localStorage.getItem('daily_talk_gemini_key')) startApp(); };
</script>
</body>
</html>
