<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Optimism Engine</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; position: relative; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; min-height: 50px; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; }
        .card p { margin: 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; }
        .refresh-btn { display: block; width: 100%; background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .refresh-btn:hover { background: #475569; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Talk ✨</h1>
    <div class="status-area">
        <div id="statusText">Generiere inspirierende Themen...</div>
    </div>
    <div id="results"></div>
    <button class="refresh-btn" onclick="startApp()">Neue Inspiration laden ↻</button>
</div>

<script>
    let API_KEY = localStorage.getItem('daily_talk_gemini_key');

    async function checkKey() {
        if (!API_KEY) {
            const userKey = prompt("Bitte gib deinen Gemini API-Key ein:");
            if (userKey) {
                localStorage.setItem('daily_talk_gemini_key', userKey.trim());
                API_KEY = userKey.trim();
                return true;
            }
            return false;
        }
        return true;
    }

    async function startApp() {
        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        status.style.display = 'block';
        status.textContent = "Suche globale Lichtblicke...";

        if (!await checkKey()) return;

        try {
            // 1. Modell-URL (Wir nehmen direkt das Flash Modell)
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            // 2. Der "Master-Prompt" - Er fragt nach echtem Wissen, nicht nach News-Feeds
            const prompt = `Du bist ein Experte für konstruktiven Journalismus und positive globale Trends. 
            Nenne mir 3 bis 4 aktuelle, belegbare Erfolgsgeschichten oder positive Trends aus den Jahren 2025/2026 in den Bereichen:
            - Klimaschutz (z.B. Energie-Durchbrüche, Artenschutz)
            - Soziale Gerechtigkeit (z.B. Armutsbekämpfung, Bildung)
            - Weltfrieden & Kooperation (z.B. neue Abkommen, Abrüstung)
            - Kurioses & Menschlichkeit.
            Erstelle daraus Eisbrecher für sympathischen Small-Talk.
            Antworte NUR als JSON-Array: [{"category": "THEMA", "title": "TITEL", "explanation": "DETAILS"}]`;

            const aiRes = await fetch(modelUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.9 }
                })
            });

            const aiData = await aiRes.json();
            
            if (aiData.error) throw new Error(aiData.error.message);

            const rawText = aiData.candidates[0].content.parts[0].text;
            const jsonStr = rawText.substring(rawText.indexOf('['), rawText.lastIndexOf(']') + 1);
            const icebreakers = JSON.parse(jsonStr);

            status.style.display = 'none';
            icebreakers.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<span class="tag">${item.category}</span><h3>${item.title}</h3><p>${item.explanation}</p>`;
                    resultsDiv.appendChild(div);
                }, index * 200);
            });

        } catch (err) {
            status.innerHTML = `<div style="color:#fca5a5;">Fehler: ${err.message}<br><button onclick="localStorage.removeItem('daily_talk_gemini_key'); location.reload();">Key neu eingeben</button></div>`;
        }
    }

    window.onload = startApp;
</script>
</body>
</html>
