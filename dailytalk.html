<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Pure Positivity</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; line-height: 1.3; }
        .card p { margin: 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .loader-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--primary); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--primary), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--primary), 1em 0 0 var(--primary); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Talk ✨</h1>
    <div class="status-area">
        <div id="statusText" class="loader-dots">Initialisiere Positiv-Radar</div>
    </div>
    <div id="results"></div>
</div>

<script>
    const API_KEY = 'AIzaSyCRYqi7ItekQoX-wMB35J2j8on_u0g4a_o'; // <-- Check hier nochmal auf Leerzeichen!
    
    const SEARCH_QUERY = "Klimaschutz Erfolge OR soziale Gerechtigkeit Fortschritt OR Friedensinitiativen OR positive Nachrichten OR Innovation Nachhaltigkeit";
    const RSS_URL = `https://news.google.com/rss/search?q=${encodeURIComponent(SEARCH_QUERY)}&hl=de&gl=DE&ceid=DE:de`;

    async function startApp() {
        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');

        try {
            // Kleiner Delay, damit der Browser bereit ist
            await new Promise(r => setTimeout(r, 500));

            // 1. Modell-Check
            status.textContent = "Suche bestes Modell";
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            
            if (!modelRes.ok) throw new Error("API-Key ungültig oder Google-Dienst nicht erreichbar.");
            
            const modelData = await modelRes.json();
            const priorities = ['gemini-3-flash', 'gemini-3-flash-preview', 'gemini-2.0-flash', 'gemini-1.5-flash'];
            const models = modelData.models.map(m => m.name);
            let found = priorities.find(p => models.some(m => m.includes(p))) || models[0];
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/${found.includes('/') ? found : 'models/'+found}:generateContent`;

            // 2. News laden
            status.textContent = "Scanne globale News nach Fortschritten";
            const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`);
            const rssData = await rssRes.json();
            
            if (!rssData.items || rssData.items.length === 0) {
                throw new Error("News-Feed konnte nicht geladen werden. Bitte Seite neu laden.");
            }
            
            const headlines = rssData.items.slice(0, 15).map(i => i.title).join("\n");

            // 3. KI Analyse
            status.textContent = "Erstelle inspirierende Eisbrecher";
            const prompt = `Du bist ein konstruktiver Small-Talk-Experte. Erstelle basierend auf diesen News 3-5 Eisbrecher.
            REGEL: Wähle NUR positive Entwicklungen zu Klima, Frieden, Sozialem oder Kurioses. Ignoriere Negatives.
            Antworte NUR als JSON-Array: [{"category": "THEMA", "title": "Eisbrecher", "explanation": "Erklärung"}]`;

            const aiRes = await fetch(`${modelUrl}?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + "\n\nSchlagzeilen:\n" + headlines }] }] })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error("Gemini Fehler: " + aiData.error.message);

            const rawText = aiData.candidates[0].content.parts[0].text;
            const jsonMatch = rawText.match(/\[[\s\S]*\]/);
            if (!jsonMatch) throw new Error("KI-Antwort konnte nicht gelesen werden.");
            
            const icebreakers = JSON.parse(jsonMatch[0]);

            status.style.display = 'none';
            resultsDiv.innerHTML = ''; // Vorherige Ergebnisse leeren

            icebreakers.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.opacity = '1'; // Sofort sichtbar machen nach Animation
                    div.innerHTML = `
                        <span class="tag">${item.category}</span>
                        <h3>${item.title}</h3>
                        <p>${item.explanation}</p>
                    `;
                    resultsDiv.appendChild(div);
                }, index * 200);
            });

        } catch (err) {
            status.innerHTML = `<span style="color:#fca5a5"><strong>Hoppla:</strong> ${err.message}</span>`;
            console.error("Detaillierter Fehler:", err);
        }
    }

    // Sicherer Start
    if (document.readyState === 'complete') {
        startApp();
    } else {
        window.addEventListener('load', startApp);
    }
</script>
</body>
</html>
