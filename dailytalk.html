<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Smart Model Edition</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h1 { text-align: center; font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { text-align: center; margin-bottom: 30px; font-size: 0.8rem; color: #94a3b8; }
        #activeModel { color: #38bdf8; font-weight: bold; }
        textarea { width: 100%; height: 140px; padding: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 16px; color: white; font-size: 16px; resize: none; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; margin-top: 20px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .card { background: #334155; padding: 20px; margin-bottom: 15px; border-radius: 16px; border-left: 4px solid var(--primary); animation: fadeIn 0.4s ease-out; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; }
        .card p { margin: 0; color: #cbd5e1; font-size: 15px; line-height: 1.6; }
        .loader { display: none; text-align: center; margin: 20px 0; color: var(--primary); }
        .error-box { background: #450a0a; color: #fca5a5; padding: 15px; border-radius: 12px; border: 1px solid #7f1d1d; margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Talk</h1>
    <div class="status-badge">Verbunden mit: <span id="activeModel">Suche Modell...</span></div>
    
    <textarea id="newsInput" placeholder="Aktuelle News hier reinkopieren..."></textarea>
    <button id="generateBtn" disabled>Warte auf Modell...</button>
    
    <div id="loader" class="loader">KI generiert Eisbrecher... ⚡</div>
    <div id="results"></div>
</div>

<script>
    const API_KEY = 'AIzaSyCRYqi7ItekQoX-wMB35J2j8on_u0g4a_o'; // <-- DEIN KEY
    let bestModelUrl = "";

    const btn = document.getElementById('generateBtn');
    const modelStatus = document.getElementById('activeModel');
    const results = document.getElementById('results');

    // 1. Automatische Modellsuche beim Start
    async function initApp() {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            const models = data.models.map(m => m.name);
            
            // Prioritätenliste der Modelle
            const priorities = ['gemini-3-flash', 'gemini-3-flash-preview', 'gemini-2.0-flash', 'gemini-1.5-flash'];
            let foundModel = "";

            for (const p of priorities) {
                foundModel = models.find(m => m.includes(p));
                if (foundModel) break;
            }

            if (!foundModel) foundModel = models[0]; // Notfall: Nimm das erste verfügbare

            bestModelUrl = `https://generativelanguage.googleapis.com/v1beta/${foundModel}:generateContent`;
            modelStatus.textContent = foundModel.replace('models/', '');
            btn.disabled = false;
            btn.textContent = "Eisbrecher finden";

        } catch (err) {
            modelStatus.textContent = "Fehler beim Laden";
            results.innerHTML = `<div class="error-box">Modell-Check fehlgeschlagen: ${err.message}</div>`;
        }
    }

    // 2. Generierungs-Logik
    btn.addEventListener('click', async () => {
        const text = document.getElementById('newsInput').value.trim();
        if (!text) return alert("News einfügen!");

        results.innerHTML = '';
        document.getElementById('loader').style.display = 'block';
        btn.disabled = true;

        const prompt = `Du bist ein Small-Talk-Experte. Erstelle 3-5 sympathische, harmlose Eisbrecher (kein Politik/Krise!) basierend auf diesen News. 
        Antworte NUR als valides JSON-Array: [{"title": "Satz", "explanation": "Grund"}]`;

        try {
            const response = await fetch(`${bestModelUrl}?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + "\n\nNews:\n" + text }] }] })
            });

            const data = await response.json();
            const rawResponse = data.candidates[0].content.parts[0].text;
            
            const jsonStr = rawResponse.substring(rawResponse.indexOf('['), rawResponse.lastIndexOf(']') + 1);
            const icebreakers = JSON.parse(jsonStr);

            icebreakers.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${item.title}</h3><p>${item.explanation}</p>`;
                results.appendChild(div);
            });

        } catch (err) {
            results.innerHTML = `<div class="error-box">Generierung fehlgeschlagen: ${err.message}</div>`;
        } finally {
            document.getElementById('loader').style.display = 'none';
            btn.disabled = false;
        }
    });

    initApp();
</script>

</body>
</html>
