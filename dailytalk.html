<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Pure Positivity</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; line-height: 1.3; }
        .card p { margin: 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .loader-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--primary); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--primary), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--primary), 1em 0 0 var(--primary); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Talk ✨</h1>
    <div class="status-area">
        <div id="statusText" class="loader-dots">Initialisiere Positiv-Radar</div>
    </div>
    <div id="results"></div>
</div>

<script>
    const API_KEY = 'AIzaSyCRYqi7ItekQoX-wMB35J2j8on_u0g4a_o'; // <-- Check hier nochmal auf Leerzeichen!
    
    async function startApp() {
        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');

        try {
            status.textContent = "Verbinde mit Google KI...";
            
            // 1. Modell-Check mit detaillierter Fehlerausgabe
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            
            if (!modelRes.ok) {
                const errorData = await modelRes.json();
                const reason = errorData.error ? errorData.error.message : "Unbekannter Fehler";
                throw new Error(`Google sagt (${modelRes.status}): ${reason}`);
            }
            
            const modelData = await modelRes.json();
            const priorities = ['gemini-3-flash', 'gemini-2.0-flash', 'gemini-1.5-flash'];
            const models = modelData.models.map(m => m.name);
            let found = priorities.find(p => models.some(m => m.includes(p))) || models[0].name;
            
            // WICHTIG: Korrekte URL-Formatierung für v1beta
            const modelName = found.includes('/') ? found : `models/${found}`;
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${API_KEY}`;

            // 2. News laden
            status.textContent = "Hole inspirierende Nachrichten...";
            const search = encodeURIComponent("Klimaschutz Erfolge OR soziale Gerechtigkeit Fortschritt OR Frieden");
            const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q='+search+'&hl=de&gl=DE&ceid=DE:de')}`;
            
            const rssRes = await fetch(rssUrl);
            const rssData = await rssRes.json();
            const headlines = rssData.items.slice(0, 10).map(i => i.title).join("\n");

            // 3. KI Generierung
            status.textContent = "KI erstellt Eisbrecher...";
            const prompt = "Erstelle aus diesen News 3-5 positive Small-Talk Eisbrecher zu Klima/Frieden/Soziales. Antworte NUR als JSON-Array: [{\"category\": \"TAG\", \"title\": \"SATZ\", \"explanation\": \"GRUND\"}]";

            const aiRes = await fetch(modelUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + "\n\nNews:\n" + headlines }] }] })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error("KI Fehler: " + aiData.error.message);

            const rawText = aiData.candidates[0].content.parts[0].text;
            const jsonMatch = rawText.match(/\[[\s\S]*\]/);
            const icebreakers = JSON.parse(jsonMatch[0]);

            status.style.display = 'none';
            resultsDiv.innerHTML = ''; 

            icebreakers.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.opacity = '1';
                    div.innerHTML = `<span class="tag">${item.category}</span><h3>${item.title}</h3><p>${item.explanation}</p>`;
                    resultsDiv.appendChild(div);
                }, index * 200);
            });

        } catch (err) {
            status.innerHTML = `<div class="error-box" style="background:#450a0a; color:#fca5a5; padding:15px; border-radius:12px; border:1px solid #7f1d1d;">
                <strong>Diagnose:</strong><br>${err.message}
            </div>`;
            console.error(err);
        }
    }

    window.onload = startApp;
</script>
</body>
</html>
