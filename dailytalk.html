<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Modern GoodNews</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; position: relative; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; min-height: 50px; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; opacity: 0; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; line-height: 1.3; }
        .card p { margin: 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .refresh-btn { display: block; width: 100%; background: #334155; border: 1px solid #475569; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: all 0.3s; font-size: 0.9rem; }
        .refresh-btn:hover { background: #475569; border-color: #94a3b8; }
        .settings-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #475569; cursor: pointer; font-size: 0.8rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="resetKey()">Key ändern ⚙️</button>
    <h1>Daily Talk ✨</h1>
    <div class="status-area">
        <div id="statusText">Suche kompatibles Modell...</div>
    </div>
    <div id="results"></div>
    <button class="refresh-btn" onclick="startApp()">Inspiration aktualisieren ↻</button>
</div>

<script>
    let API_KEY = localStorage.getItem('daily_talk_gemini_key');

    function resetKey() {
        localStorage.removeItem('daily_talk_gemini_key');
        location.reload();
    }

    async function checkKey() {
        if (!API_KEY) {
            const userKey = prompt("Bitte gib deinen Gemini API-Key ein:");
            if (userKey) {
                localStorage.setItem('daily_talk_gemini_key', userKey.trim());
                API_KEY = userKey.trim();
                return true;
            }
            return false;
        }
        return true;
    }

    async function startApp() {
        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');
        
        if (!await checkKey()) return;

        resultsDiv.innerHTML = '';
        status.style.display = 'block';
        status.textContent = "Analysiere verfügbare KI-Modelle...";

        try {
            // 1. Modelle abrufen und filtern
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            if (!modelRes.ok) throw new Error("API-Key ungültig.");
            
            const modelData = await modelRes.json();
            
            // Filtert Modelle, die "generateContent" unterstützen
            const validModels = modelData.models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
            
            // Bevorzugte Reihenfolge (Gemini 2 ist oft stabiler in v1beta als das brandneue 3)
            const priorities = ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-pro'];
            let chosenModel = validModels.find(m => priorities.some(p => m.name.includes(p))) || validModels[0];

            if (!chosenModel) throw new Error("Kein kompatibles Modell gefunden.");
            
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/${chosenModel.name}:generateContent?key=${API_KEY}`;

            // 2. News von GoodNews.eu
            status.textContent = "Hole News von goodnews.eu...";
            const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://goodnews.eu/feed/')}`);
            const rssData = await rssRes.json();
            const headlines = rssData.items.slice(0, 7).map(i => i.title).join("\n");

            // 3. KI-Generierung
            status.textContent = `Nutze ${chosenModel.displayName || chosenModel.name.split('/').pop()}...`;
            
            const prompt = `Erstelle aus diesen positiven News 3-4 sympathische Small-Talk Eisbrecher. 
            Antworte nur als JSON: [{"category": "TAG", "title": "SATZ", "explanation": "INFO"}] \n\nNews:\n${headlines}`;

            const aiRes = await fetch(modelUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const aiData = await aiRes.json();
            if (aiData.error) throw new Error(aiData.error.message);

            const rawText = aiData.candidates[0].content.parts[0].text;
            const jsonStr = rawText.substring(rawText.indexOf('['), rawText.lastIndexOf(']') + 1);
            const icebreakers = JSON.parse(jsonStr);

            status.style.display = 'none';
            icebreakers.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<span class="tag">${item.category}</span><h3>${item.title}</h3><p>${item.explanation}</p>`;
                    div.style.animationDelay = `${index * 0.1}s`;
                    resultsDiv.appendChild(div);
                }, index * 150);
            });

        } catch (err) {
            status.innerHTML = `<div style="border:1px solid #ef4444; padding:15px; border-radius:12px; color:#fca5a5;"><strong>Fehler:</strong> ${err.message}</div>`;
        }
    }

    window.onload = startApp;
</script>
</body>
</html>
