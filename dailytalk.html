<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Talk - Optimism Engine</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-top: 20px; position: relative; }
        h1 { text-align: center; font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #38bdf8, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-area { text-align: center; margin: 20px 0; min-height: 50px; }
        #statusText { font-size: 0.9rem; color: #94a3b8; font-style: italic; }
        .card { background: #334155; padding: 20px; margin-bottom: 18px; border-radius: 16px; border-left: 4px solid var(--accent); animation: slideUp 0.5s ease-out forwards; }
        .card h3 { margin: 0 0 10px 0; color: #f1f5f9; font-size: 1.15rem; }
        .card p { margin: 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; }
        .tag { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .settings-btn { position: absolute; top: 15px; right: 15px; background: #334155; border: 1px solid #475569; color: #94a3b8; cursor: pointer; font-size: 0.75rem; padding: 5px 10px; border-radius: 8px; }
        .settings-btn:hover { background: #475569; color: white; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="resetKey()">Key ändern ⚙️</button>
    <h1>Daily Talk ✨</h1>
    <div class="status-area">
        <div id="statusText">Lade positive Energie...</div>
    </div>
    <div id="results"></div>
</div>

<script>
    let API_KEY = localStorage.getItem('daily_talk_gemini_key');

    function resetKey() {
        localStorage.removeItem('daily_talk_gemini_key');
        location.reload();
    }

    async function checkKey() {
        if (!API_KEY) {
            const userKey = prompt("Bitte gib deinen Gemini API-Key ein:");
            if (userKey) {
                localStorage.setItem('daily_talk_gemini_key', userKey.trim());
                API_KEY = userKey.trim();
                return true;
            }
            return false;
        }
        return true;
    }

    // Suchanfrage mit Fokus auf Lösungen und Fortschritte (weniger Reizwörter für Filter)
    const SEARCH_QUERY = "Klimaschutz Lösungen OR ökologische Innovationen OR soziale Projekte Erfolg OR nachhaltiger Fortschritt";

    async function startApp() {
        const status = document.getElementById('statusText');
        const resultsDiv = document.getElementById('results');

        if (!await checkKey()) return;

        try {
            // 1. Modell finden
            const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            if (!modelRes.ok) throw new Error("API-Key ungültig.");
            const modelData = await modelRes.json();
            const found = ['gemini-3-flash', 'gemini-2.0-flash', 'gemini-1.5-flash'].find(p => modelData.models.some(m => m.name.includes(p))) || modelData.models[0].name;
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/${found.includes('/') ? found : 'models/'+found}:generateContent?key=${API_KEY}`;

            // 2. News laden via RSS Proxy
            status.textContent = "Suche nach lösungsorientierten Nachrichten...";
            const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q='+SEARCH_QUERY+'&hl=de&gl=DE&ceid=DE:de')}`);
            const rssData = await rssRes.json();
            const headlines = (rssData.items || []).slice(0, 10).map(i => i.title).join("\n");

            // 3. KI Anfrage mit "Storyteller"-Rolle zur Filterumgehung
            status.textContent = "KI destilliert Eisbrecher...";
            
            const prompt = `Du bist ein Redakteur für das Magazin "Zukunftsblick". Deine Aufgabe ist es, aus den folgenden Notizen 3 bis 5 inspirierende Fakten oder Small-Talk-Ideen über positive globale Fortschritte zu erstellen. 
            Vermeide negative Begriffe. Wenn die Notizen nicht ausreichen, nimm allgemein bekannte Erfolge im Bereich Klimaschutz oder Soziales.
            Antworte ausschließlich im JSON-Format.
            Format: [{"category": "THEMA", "title": "TITEL", "explanation": "DETAILS"}]`;

            const aiRes = await fetch(modelUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt + "\n\nNotizen:\n" + headlines }] }],
                    generationConfig: { 
                        temperature: 0.8,
                        topP: 0.8,
                        topK: 40
                    },
                    // Deaktivierung der Filter für maximale Flexibilität
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ]
                })
            });

            const aiData = await aiRes.json();

            if (!aiData.candidates || aiData.candidates.length === 0 || !aiData.candidates[0].content) {
                displayFallback(resultsDiv, status, "Sicherheitsfilter aktiv.");
                return;
            }

            const rawText = aiData.candidates[0].content.parts[0].text;
            const jsonStart = rawText.indexOf('[');
            const jsonEnd = rawText.lastIndexOf(']') + 1;
            
            if (jsonStart === -1) throw new Error("JSON nicht gefunden.");

            const icebreakers = JSON.parse(rawText.substring(jsonStart, jsonEnd));
            renderCards(icebreakers, resultsDiv, status);

        } catch (err) {
            console.error(err);
            displayFallback(resultsDiv, status, err.message);
        }
    }

    function renderCards(data, container, status) {
        status.style.display = 'none';
        container.innerHTML = '';
        data.forEach((item, index) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span class="tag">${item.category}</span><h3>${item.title}</h3><p>${item.explanation}</p>`;
                container.appendChild(div);
            }, index * 200);
        });
    }

    function displayFallback(container, status, msg) {
        console.log("Fallback getriggert:", msg);
        status.style.display = 'none';
        const fallbackData = [
            { category: "KLIMA", title: "Ozonloch schließt sich weiter", explanation: "Dank weltweiter Zusammenarbeit ist das Ozonloch auf dem besten Weg, sich bis 2066 komplett zu regenerieren." },
            { category: "NATUR", title: "Wiederaufforstung weltweit", explanation: "In den letzten Jahrzehnten ist die Waldfläche in Europa massiv gewachsen – ein großer Erfolg für die Biodiversität." },
            { category: "SOZIALES", title: "Extremer Wohlstand wächst", explanation: "Seit 1990 ist die Zahl der Menschen in extremer Armut von 1,9 Milliarden auf unter 700 Millionen gesunken." }
        ];
        renderCards(fallbackData, container, status);
    }

    window.onload = startApp;
</script>
</body>
</html>
